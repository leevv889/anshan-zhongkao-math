<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鞍山中考数学·知识点诊断测试</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"><\/script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"><\/script>
<style>
:root {
  --primary: #2563EB;
  --primary-light: #EFF6FF;
  --success: #22C55E;
  --success-light: #F0FDF4;
  --error: #EF4444;
  --error-light: #FEF2F2;
  --warning: #F59E0B;
  --warning-light: #FFFBEB;
  --text: #1E293B;
  --text-secondary: #64748B;
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

.header {
  background: var(--primary);
  color: white;
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 17px; font-weight: 600; }
.header-meta { font-size: 13px; opacity: 0.85; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
.timer { font-variant-numeric: tabular-nums; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 20px; font-size: 13px; }

.progress-bar { height: 3px; background: rgba(255,255,255,0.3); }
.progress-fill { height: 100%; background: white; transition: width 0.3s ease; }

.question-container { padding: 16px; max-width: 600px; margin: 0 auto; }

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 16px;
  display: none;
}
.question-card.active { display: block; }

.q-number {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.q-badge {
  background: var(--primary-light);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
}
.q-difficulty {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}
.q-difficulty.basic { background: var(--success-light); color: var(--success); }
.q-difficulty.medium { background: var(--warning-light); color: var(--warning); }
.q-difficulty.hard { background: var(--error-light); color: var(--error); }

.q-subject {
  font-size: 12px;
  color: var(--text-secondary);
}

.q-text {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 16px;
  word-break: break-word;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 15px;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}
.option:active { transform: scale(0.98); }
.option.selected { border-color: var(--primary); background: var(--primary-light); }
.option-letter {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  flex-shrink: 0;
  margin-top: 1px;
}
.option.selected .option-letter { background: var(--primary); color: white; }

.fill-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.fill-input:focus { border-color: var(--primary); }
.fill-hint { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

.nav-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  padding: 12px 16px;
  max-width: 600px;
  margin: 0 auto;
}
.nav-dot {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-secondary);
}
.nav-dot.active { border-color: var(--primary); background: var(--primary); color: white; }
.nav-dot.answered { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.nav-dot.correct { border-color: var(--success); background: var(--success); color: white; }
.nav-dot.wrong { border-color: var(--error); background: var(--error); color: white; }

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
}
.bottom-row-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.btn {
  padding: 10px 24px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.btn:active { transform: scale(0.96); }
.btn-outline { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-primary { background: var(--primary); color: white; }
.btn-submit { background: var(--success); color: white; display: none; width: 100%; padding: 12px; font-size: 16px; text-align: center; }
.btn-submit.show { display: block; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.answer-count { font-size: 13px; color: var(--text-secondary); }

.results-page {
  display: none;
  padding: 20px 16px;
  max-width: 600px;
  margin: 0 auto;
}
.results-page.show { display: block; }

.score-card {
  background: var(--card);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.score-ring {
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring circle {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
}
.score-ring .bg { stroke: var(--border); }
.score-ring .fg { transition: stroke-dashoffset 1s ease; }
.score-number {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 36px;
  font-weight: 700;
}
.score-label { font-size: 14px; color: var(--text-secondary); }

.stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.stat-item {
  flex: 1;
  background: var(--card);
  border-radius: 12px;
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.stat-value { font-size: 24px; font-weight: 700; }
.stat-value.correct-color { color: var(--success); }
.stat-value.wrong-color { color: var(--error); }
.stat-value.time-color { color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.diagnosis-section { margin-bottom: 20px; }
.diagnosis-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; padding: 0 4px; }
.diagnosis-item {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.diagnosis-topic { font-size: 14px; font-weight: 500; }
.diagnosis-bar-wrap {
  width: 120px;
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 12px;
  flex-shrink: 0;
}
.diagnosis-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}
.diagnosis-score { font-size: 13px; font-weight: 600; min-width: 48px; text-align: right; }

.review-section { margin-bottom: 20px; }
.review-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; padding: 0 4px; }

.review-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.review-toggle-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-secondary);
}
.review-toggle-btn.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 500;
}

.review-item {
  background: var(--card);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--border);
}
.review-item.correct { border-left-color: var(--success); }
.review-item.wrong { border-left-color: var(--error); }

.review-q { font-size: 14px; margin-bottom: 8px; color: var(--text-secondary); }
.review-answer { font-size: 15px; font-weight: 500; }
.review-answer.correct-text { color: var(--success); }
.review-answer.wrong-text { color: var(--error); }
.review-explain {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  line-height: 1.6;
}

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
  padding-bottom: 20px;
}
.btn-copy {
  background: var(--primary);
  color: white;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.btn-copy:active { opacity: 0.8; }
.btn-retry {
  background: var(--bg);
  color: var(--text);
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 16px;
  cursor: pointer;
  font-family: inherit;
}

.copy-hint {
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 15px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.start-page {
  padding: 40px 20px;
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
.start-card {
  background: var(--card);
  border-radius: 16px;
  padding: 32px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.start-icon { font-size: 48px; margin-bottom: 16px; }
.start-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.start-info { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.8; }
.start-info span { display: block; }
.btn-start {
  background: var(--primary);
  color: white;
  padding: 14px 48px;
  border-radius: 12px;
  border: none;
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}

.name-input-wrap {
  margin-bottom: 20px;
}
.name-input {
  width: 100%;
  max-width: 260px;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.name-input:focus { border-color: var(--primary); }
.name-input::placeholder { color: #CBD5E1; }

.btn-notebook {
  background: var(--bg);
  color: var(--text);
  padding: 14px 48px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 16px;
  cursor: pointer;
  font-family: inherit;
  margin-top: 12px;
}
.btn-notebook:active { opacity: 0.8; }
.notebook-badge {
  display: inline-block;
  background: var(--error);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 6px;
  vertical-align: middle;
}

.notebook-page {
  display: none;
  padding: 20px 16px;
  max-width: 600px;
  margin: 0 auto;
}
.notebook-page.show { display: block; }

.notebook-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding: 0 4px;
}
.notebook-header-title {
  font-size: 18px;
  font-weight: 600;
}
.btn-back {
  background: var(--bg);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.btn-back:active { opacity: 0.8; }

.notebook-empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
  font-size: 15px;
}
.notebook-empty-icon { font-size: 40px; margin-bottom: 12px; }

.nb-item {
  background: var(--card);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--error);
}
.nb-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.nb-item-meta {
  font-size: 12px;
  color: var(--text-secondary);
}
.nb-item-actions {
  display: flex;
  gap: 6px;
}
.nb-btn {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-secondary);
}
.nb-btn:active { opacity: 0.7; }
.nb-btn.mastered { border-color: var(--success); color: var(--success); background: var(--success-light); }
.nb-btn.delete { border-color: var(--error); color: var(--error); background: var(--error-light); }
.nb-item-q { font-size: 14px; color: var(--text); margin-bottom: 6px; line-height: 1.6; }
.nb-item-answer { font-size: 13px; color: var(--text-secondary); }
.nb-item-answer span { font-weight: 500; }
.nb-item-explain {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  line-height: 1.6;
}
.nb-item.mastered-item { border-left-color: var(--success); opacity: 0.7; }

.nb-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.nb-filter-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-secondary);
}
.nb-filter-btn.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 500;
}

@media (max-width: 380px) {
  .nav-dots { gap: 5px; padding: 10px 12px; }
  .nav-dot { width: 28px; height: 28px; font-size: 12px; border-radius: 6px; }
  .question-container { padding: 12px; }
  .question-card { padding: 16px; }
  .q-text { font-size: 15px; }
  .option { padding: 12px 14px; font-size: 14px; gap: 10px; }
  .option-letter { width: 22px; height: 22px; font-size: 12px; }
  .bottom-bar { padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  .btn { padding: 9px 16px; font-size: 14px; }
  .header { padding: 14px 16px; }
  .start-page { padding: 24px 16px; }
  .start-card { padding: 24px 20px; }
  .score-ring { width: 120px; height: 120px; }
  .score-number { font-size: 30px; }
  .stat-item { padding: 12px 8px; }
  .stat-value { font-size: 20px; }
  .fill-input { padding: 12px 14px; font-size: 15px; }
  .diagnosis-bar-wrap { width: 80px; }
}

@media (min-width: 768px) {
  .question-container, .results-page, .start-page, .nav-dots { max-width: 680px; }
  .q-text { font-size: 17px; line-height: 1.9; }
  .option { font-size: 16px; padding: 16px 18px; }
  .question-card { padding: 24px; }
  .start-card { padding: 40px 32px; }
  .score-card { padding: 40px 32px; }
}

@media (min-width: 1024px) {
  .question-container, .results-page, .start-page, .nav-dots { max-width: 720px; }
  body { padding-bottom: 0; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="startPage" class="start-page">
  <div class="start-card">
    <div class="start-icon">📝</div>
    <div class="start-title" id="startTitle">鞍山中考数学·知识点诊断测试</div>
    <div class="start-info" id="startInfo">
      <span>科目：数学（七年级+八年级+九年级）</span>
      <span>题数：20 题（随机组卷）</span>
      <span>用时：约 30-40 分钟</span>
      <span>每次测试从57题题库中随机抽取，覆盖15个知识点</span>
      <span>完成后复制结果发送给教练即可自动分析</span>
    </div>
    <div class="name-input-wrap">
      <input class="name-input" id="studentNameInput" type="text" placeholder="输入你的姓名" maxlength="20">
    </div>
    <button class="btn-start" onclick="startQuiz()">开始答题</button>
    <br>
    <button class="btn-notebook" id="btnNotebook" onclick="showNotebook()" style="display:none">📓 错题本<span class="notebook-badge" id="notebookBadge">0</span></button>
  </div>
</div>

<div id="quizPage" style="display:none">
  <div class="header">
    <div class="header-title" id="headerTitle">鞍山中考数学·知识点诊断测试</div>
    <div class="header-meta">
      <span id="headerSubject">数学（七年级+八年级+九年级）</span>
      <span class="timer" id="timer">00:00</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="question-container" id="questionContainer"></div>

  <div class="nav-dots" id="navDots"></div>

  <div class="bottom-bar">
    <div class="bottom-row-nav">
      <button class="btn btn-outline" id="btnPrev" onclick="prevQuestion()">上一题</button>
      <span class="answer-count" id="answerCount">已答 0/20</span>
      <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()">下一题</button>
    </div>
    <button class="btn btn-submit" id="btnSubmit" onclick="submitQuiz()">📩 交卷</button>
  </div>
</div>

<div id="resultsPage" class="results-page">
  <div class="score-card">
    <div class="score-ring">
      <svg width="140" height="140">
        <circle class="bg" cx="70" cy="70" r="60"></circle>
        <circle class="fg" id="scoreRing" cx="70" cy="70" r="60"
          stroke-dasharray="377" stroke-dashoffset="377"></circle>
      </svg>
      <div class="score-number" id="scoreNumber">0%</div>
    </div>
    <div class="score-label" id="scoreLabel">计算中...</div>
  </div>

  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-value correct-color" id="statCorrect">0</div>
      <div class="stat-label">正确</div>
    </div>
    <div class="stat-item">
      <div class="stat-value wrong-color" id="statWrong">0</div>
      <div class="stat-label">错误</div>
    </div>
    <div class="stat-item">
      <div class="stat-value time-color" id="statTime">00:00</div>
      <div class="stat-label">用时</div>
    </div>
  </div>

  <div class="diagnosis-section">
    <div class="diagnosis-title">知识点诊断</div>
    <div id="diagnosisList"></div>
  </div>

  <div class="review-section">
    <div class="review-title">答题详情</div>
    <div class="review-toggle">
      <button class="review-toggle-btn active" onclick="toggleReview('all', this)">全部</button>
      <button class="review-toggle-btn" onclick="toggleReview('wrong', this)">仅错题</button>
    </div>
    <div id="reviewList"></div>
  </div>

  <div class="result-actions">

 $B$，则 $\\triangle AOB$ 的面积为", "answer": "B", "explain": "设 $A$ 点坐标为 $(a, \\dfrac{6}{a})$，则 $OB = a$，$AB = \\dfrac{6}{a}$。$\\triangle AOB$ 的面积 $= \\dfrac{1}{2} \\times OB \\times AB = \\dfrac{1}{2} \\times a \\times \\dfrac{6}{a} = 3$。反比例函数中 $S = \\dfrac{1}{2}|k| = \\dfrac{1}{2} \\times 6 = 3$。", "options": ["$2$", "$3$", "$6$", "$12$"], "source": "2023鞍山中考真题"}, {"id": 24, "subject": "数学", "topic": "反比例函数", "difficulty": "medium", "type": "fill", "text": "已知反比例函数 $y = \\dfrac{k}{x}$（$k \\neq 0$），当 $x > 0$ 时，$y$ 随 $x$ 的增大而增大，则 $k$ 的取值范围是 ______。", "answer": "$k < 0$", "explain": "反比例函数 $y = \\dfrac{k}{x}$，当 $k > 0$ 时，在每个象限内 $y$ 随 $x$ 增大而减小；当 $k < 0$ 时，在每个象限内 $y$ 随 $x$ 增大而增大。题目要求 $x > 0$ 时 $y$ 随 $x$ 增大而增大，所以 $k < 0$。", "acceptAlso": ["k<0"], "source": "AI出题"}], "二次函数": [{"id": 25, "subject": "数学", "topic": "二次函数", "difficulty": "basic", "type": "choice", "text": "二次函数 $y = (x - 1)^2 + 2$ 的顶点坐标为", "answer": "A", "explain": "二次函数 $y = a(x - h)^2 + k$ 的顶点坐标为 $(h, k)$。将 $y = (x - 1)^2 + 2$ 与标准形式对比，$h = 1$，$k = 2$，所以顶点坐标为 $(1, 2)$。", "options": ["$(1, 2)$", "$(-1, 2)$", "$(1, -2)$", "$(-1, -2)$"], "source": "AI出题"}, {"id": 26, "subject": "数学", "topic": "二次函数", "difficulty": "medium", "type": "choice", "text": "将二次函数 $y = x^2 - 2x + 3$ 的图象先向左平移 $2$ 个单位，再向下平移 $1$ 个单位，所得图象的解析式为", "answer": "A", "explain": "先将 $y = x^2 - 2x + 3$ 化为顶点式：$y = (x-1)^2 + 2$，顶点为 $(1, 2)$。向左平移 $2$ 个单位：顶点变为 $(1-2, 2) = (-1, 2)$。向下平移 $1$ 个单位：顶点变为 $(-1, 2-1) = (-1, 1)$。所以 $y = (x+1)^2 + 1$。", "options": ["$y = (x+1)^2 + 1$", "$y = (x+1)^2 + 2$", "$y = (x-3)^2 + 1$", "$y = (x-3)^2 + 2$"], "source": "AI出题"}, {"id": 27, "subject": "数学", "topic": "二次函数", "difficulty": "hard", "type": "choice", "text": "二次函数 $y = ax^2 + bx + c$（$a \\neq 0$）的图象如图所示，下列结论正确的是", "answer": "D", "explain": "由图象开口向下知 $a < 0$；由对称轴 $x = -\\dfrac{b}{2a} > 0$ 且 $a < 0$，得 $b > 0$（此项也正确但需结合图象）；由图象与 $y$ 轴交于正半轴知 $c > 0$；由图象与 $x$ 轴有两个交点知 $\\Delta = b^2 - 4ac > 0$。综合图象信息，D 一定正确。", "options": ["$a > 0$", "$b > 0$", "$c < 0$", "$b^2 - 4ac > 0$"], "source": "2023鞍山中考真题"}, {"id": 28, "subject": "数学", "topic": "二次函数", "difficulty": "medium", "type": "fill", "text": "二次函数 $y = x^2 - 4x + 3$ 的图象与 $x$ 轴的两个交点之间的距离为 ______。", "answer": "2", "explain": "令 $y = 0$：$x^2 - 4x + 3 = 0$，$(x-1)(x-3) = 0$，$x_1 = 1$，$x_2 = 3$。两个交点为 $(1, 0)$ 和 $(3, 0)$，距离 $= 3 - 1 = 2$。", "acceptAlso": ["$2$"], "source": "AI出题"}, {"id": 29, "subject": "数学", "topic": "二次函数", "difficulty": "hard", "type": "fill", "text": "已知二次函数 $y = ax^2 + bx + c$ 的图象经过点 $A(-1, 0)$ 和 $B(3, 0)$，且顶点纵坐标为 $-4$，则 $a = $ ______。", "answer": "1", "explain": "由 $A(-1, 0)$ 和 $B(3, 0)$ 可知对称轴为 $x = \\dfrac{-1+3}{2} = 1$，顶点为 $(1, -4)$。设 $y = a(x-1)^2 - 4$，将 $A(-1, 0)$ 代入：$0 = a(-1-1)^2 - 4 = 4a - 4$，$a = 1$。", "acceptAlso": ["$1$"], "source": "AI出题"}], "统计与概率": [{"id": 30, "subject": "数学", "topic": "统计与概率", "difficulty": "basic", "type": "choice", "text": "数据 $3$，$5$，$4$，$7$，$5$，$3$，$5$ 的中位数和众数分别是", "answer": "B", "explain": "将数据从小到大排列：$3, 3, 4, 5, 5, 5, 7$。共 $7$ 个数据，中位数为第 $4$ 个，即 $5$。众数是出现次数最多的数，$5$ 出现了 $3$ 次，众数为 $5$。", "options": ["$4$ 和 $5$", "$5$ 和 $5$", "$3$ 和 $5$", "$5$ 和 $3$"], "source": "2023鞍山中考真题"}, {"id": 31, "subject": "数学", "topic": "统计与概率", "difficulty": "basic", "type": "choice", "text": "一个不透明的袋子中有 $3$ 个红球和 $2$ 个白球，这些球除颜色外完全相同。随机摸出一个球，摸到红球的概率是", "answer": "A", "explain": "袋子中共有 $3 + 2 = 5$ 个球，其中红球 $3$ 个。摸到红球的概率 $P = \\dfrac{3}{5}$。", "options": ["$\\dfrac{3}{5}$", "$\\dfrac{2}{5}$", "$\\dfrac{1}{2}$", "$\\dfrac{1}{3}$"], "source": "AI出题"}, {"id": 32, "subject": "数学", "topic": "统计与概率", "difficulty": "medium", "type": "choice", "text": "某校为了解全校 $1200$ 名学生的视力情况，随机抽取了 $200$ 名学生进行视力检测。下列说法正确的是", "answer": "D", "explain": "总体是 $1200$ 名学生的视力情况（不是学生本身），个体是每名学生的视力情况，样本是 $200$ 名学生的视力情况，样本容量是 $200$（不带单位）。A、B、C 的表述都不够准确，D 正确。", "options": ["$1200$ 名学生是总体", "每名学生是个体", "$200$ 名学生是总体的一个样本", "样本容量是 $200$"], "source": "AI出题"}, {"id": 33, "subject": "数学", "topic": "统计与概率", "difficulty": "medium", "type": "fill", "text": "一个口袋中有 $4$ 个小球，分别标有数字 $1$，$2$，$3$，$4$。随机摸出一个小球，记下数字后放回，再随机摸出一个。两次摸出的数字之和为偶数的概率是 ______。", "answer": "$\\dfrac{1}{2}$", "explain": "两次摸球共有 $4 \\times 4 = 16$ 种等可能结果。和为偶数的情况：奇+奇或偶+偶。奇数有 $1, 3$，偶数有 $2, 4$。奇+奇：$2 \\times 2 = 4$ 种；偶+偶：$2 \\times 2 = 4$ 种。共 $8$ 种。$P = \\dfrac{8}{16} = \\dfrac{1}{2}$。", "acceptAlso": ["1/2", "$\\frac{1}{2}$", "0.5"], "source": "AI出题"}], "三角形": [{"id": 34, "subject": "数学", "topic": "三角形", "difficulty": "basic", "type": "choice", "text": "在 $\\triangle ABC$ 中，$\\angle A = 50°$，$\\angle B = 70°$，则 $\\angle C$ 的度数为", "answer": "B", "explain": "三角形内角和为 $180°$。$\\angle C = 180° - \\angle A - \\angle B = 180° - 50° - 70° = 60°$。", "options": ["$50°$", "$60°$", "$70°$", "$80°$"], "source": "AI出题"}, {"id": 35, "subject": "数学", "topic": "三角形", "difficulty": "basic", "type": "choice", "text": "下列长度的三条线段能组成三角形的是", "answer": "C", "explain": "三角形三边关系：任意两边之和大于第三边。A：$1+2=3$，不大于 $3$，不能；B：$3+4=7<8$，不能；C：$5+6=11>10$，$5+10=15>6$，$6+10=16>5$，能；D：$4+4=8$，不大于 $8$，不能。", "options": ["$1, 2, 3$", "$3, 4, 8$", "$5, 6, 10$", "$4, 4, 8$"], "source": "AI出题"}, {"id": 36, "subject": "数学", "topic": "三角形", "difficulty": "medium", "type": "choice", "text": "在 $Rt\\triangle ABC$ 中，$\\angle C = 90°$，$AC = 3$，$BC = 4$，则 $AB$ 的长为", "answer": "A", "explain": "由勾股定理：$AB = \\sqrt{AC^2 + BC^2} = \\sqrt{3^2 + 4^2} = \\sqrt{9 + 16} = \\sqrt{25} = 5$。这是常见的 $3$-$4$-$5$ 勾股数组。", "options": ["$5$", "$6$", "$7$", "$\\sqrt{7}$"], "source": "2023鞍山中考真题"}, {"id": 37, "subject": "数学", "topic": "三角形", "difficulty": "basic", "type": "fill", "text": "等腰三角形的两边长分别为 $3$ 和 $7$，则它的周长为 ______。", "answer": "17", "explain": "分两种情况讨论：若腰为 $3$，则三边为 $3, 3, 7$，但 $3+3=6<7$，不满足三角形三边关系，舍去。若腰为 $7$，则三边为 $7, 7, 3$，$7+7=14>3$，$7+3=10>7$，满足条件。周长 $= 7 + 7 + 3 = 17$。", "acceptAlso": ["$17$"], "source": "AI出题"}, {"id": 38, "subject": "数学", "topic": "三角形", "difficulty": "medium", "type": "fill", "text": "在 $\\triangle ABC$ 中，$\\angle A = 40°$，$\\angle B = 75°$，则 $\\angle C$ 的外角为 ______。", "answer": "115°", "explain": "$\\angle C = 180° - \\angle A - \\angle B = 180° - 40° - 75° = 65°$。$\\angle C$ 的外角 $= 180° - 65° = 115°$。也可以直接用外角定理：$\\angle C$ 的外角 $= \\angle A + \\angle B = 40° + 75° = 115°$。", "acceptAlso": ["$115°$", "$115^{\\circ}$", "115^{\\circ}"], "source": "AI出题"}], "四边形": [{"id": 39, "subject": "数学", "topic": "四边形", "difficulty": "basic", "type": "choice", "text": "平行四边形不具有的性质是", "answer": "C", "explain": "平行四边形的性质：对边平行且相等，对角相等，邻角互补，对角线互相平分。对角线互相垂直是菱形的性质，一般平行四边形不具有。", "options": ["对边平行且相等", "对角相等", "对角线互相垂直", "对角线互相平分"], "source": "AI出题"}, {"id": 40, "subject": "数学", "topic": "四边形", "difficulty": "medium", "type": "choice", "text": "菱形的两条对角线长分别为 $6$ 和 $8$，则菱形的面积为", "answer": "B", "explain": "菱形面积等于两条对角线之积的一半：$S = \\dfrac{1}{2} \\times d_1 \\times d_2 = \\dfrac{1}{2} \\times 6 \\times 8 = 24$。", "options": ["$14$", "$24$", "$48$", "$20$"], "source": "2023鞍山中考真题"}, {"id": 41, "subject": "数学", "topic": "四边形", "difficulty": "medium", "type": "fill", "text": "矩形的两条对角线相交于点 $O$，若 $\\angle AOB = 60°$，对角线长为 $8$，则矩形的较短边长为 ______。", "answer": "4", "explain": "矩形对角线互相平分且相等，所以 $OA = OB = \\dfrac{8}{2} = 4$。在 $\\triangle AOB$ 中，$OA = OB = 4$，$\\angle AOB = 60°$，所以 $\\triangle AOB$ 是等边三角形，$AB = 4$。而另一条边 $BC$：在 $\\triangle BOC$ 中，$\\angle BOC = 120°$，$OB = OC = 4$，$BC > AB$。所以较短边长为 $4$。", "acceptAlso": ["$4$"], "source": "AI出题"}], "圆": [{"id": 42, "subject": "数学", "topic": "圆", "difficulty": "basic", "type": "choice", "text": "在圆 $O$ 中，圆心角 $\\angle AOB = 80°$，则弧 $AB$ 所对的圆周角为", "answer": "A", "explain": "同弧所对的圆周角等于圆心角的一半。圆周角 $= \\dfrac{1}{2} \\times 80° = 40°$。", "options": ["$40°$", "$80°$", "$160°$", "$20°$"], "source": "AI出题"}, {"id": 43, "subject": "数学", "topic": "圆", "difficulty": "medium", "type": "choice", "text": "已知圆的半径为 $6$ cm，则 $120°$ 的圆心角所对的弧长为", "answer": "B", "explain": "弧长公式 $l = \\dfrac{n\\pi r}{180}$，其中 $n$ 为圆心角度数，$r$ 为半径。$l = \\dfrac{120 \\times \\pi \\times 6}{180} = \\dfrac{720\\pi}{180} = 4\\pi$ cm。", "options": ["$2\\pi$ cm", "$4\\pi$ cm", "$6\\pi$ cm", "$12\\pi$ cm"], "source": "2023鞍山中考真题"}, {"id": 44, "subject": "数学", "topic": "圆", "difficulty": "medium", "type": "choice", "text": "如图，$PA$、$PB$ 分别与圆 $O$ 相切于点 $A$、$B$，$\\angle P = 50°$，则 $\\angle AOB$ 的度数为", "answer": "C", "explain": "切线的性质：$OA \\perp PA$，$OB \\perp PB$，即 $\\angle OAP = \\angle OBP = 90°$。在四边形 $OAPB$ 中，$\\angle AOB + \\angle OAP + \\angle APB + \\angle OBP = 360°$，$\\angle AOB = 360° - 90° - 50° - 90° = 130°$。", "options": ["$100°$", "$120°$", "$130°$", "$150°$"], "source": "AI出题"}, {"id": 45, "subject": "数学", "topic": "圆", "difficulty": "basic", "type": "fill", "text": "已知圆的半径为 $5$，一条弦的长为 $8$，则圆心到这条弦的距离为 ______。", "answer": "3", "explain": "设圆心到弦的距离为 $d$，弦长的一半为 $4$。由垂径定理，圆心到弦的垂线平分弦，构成直角三角形：$d^2 + 4^2 = 5^2$，$d^2 = 25 - 16 = 9$，$d = 3$。", "acceptAlso": ["$3$"], "source": "AI出题"}, {"id": 46, "subject": "数学", "topic": "圆", "difficulty": "hard", "type": "fill", "text": "一个扇形的半径为 $6$，圆心角为 $60°$，则该扇形的面积为 ______。", "answer": "$6\\pi$", "explain": "扇形面积公式 $S = \\dfrac{n\\pi r^2}{360} = \\dfrac{60 \\times \\pi \\times 6^2}{360} = \\dfrac{60 \\times 36\\pi}{360} = \\dfrac{2160\\pi}{360} = 6\\pi$。", "acceptAlso": ["6\\pi", "$6\\pi$", "6\\pi"], "source": "AI出题"}], "图形变换": [{"id": 47, "subject": "数学", "topic": "图形变换", "difficulty": "basic", "type": "choice", "text": "点 $P(-3, 2)$ 关于原点对称的点的坐标为", "answer": "A", "explain": "关于原点对称，横坐标和纵坐标都取相反数。$P(-3, 2)$ 关于原点对称的点为 $(3, -2)$。", "options": ["$(3, -2)$", "$(-3, -2)$", "$(3, 2)$", "$(-2, 3)$"], "source": "AI出题"}, {"id": 48, "subject": "数学", "topic": "图形变换", "difficulty": "medium", "type": "choice", "text": "下列图形中，既是轴对称图形又是中心对称图形的是", "answer": "C", "explain": "等腰三角形是轴对称图形，但不是中心对称图形；平行四边形是中心对称图形，但不一定是轴对称图形；圆既是轴对称图形（任何过圆心的直线都是对称轴）又是中心对称图形（对称中心为圆心）；等腰梯形是轴对称图形，但不是中心对称图形。", "options": ["等腰三角形", "平行四边形", "圆", "等腰梯形"], "source": "2023鞍山中考真题"}, {"id": 49, "subject": "数学", "topic": "图形变换", "difficulty": "medium", "type": "fill", "text": "将点 $A(2, 3)$ 绕原点顺时针旋转 $180°$ 后得到点 $A'$，则 $A'$ 的坐标为 ______。", "answer": "$(-2, -3)$", "explain": "绕原点旋转 $180°$（无论顺时针还是逆时针），等价于关于原点对称，横纵坐标都取相反数。$A(2, 3)$ function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generatePaper() {
  const paper = [];
  const usedIds = new Set();

  EXAM_DIST.forEach(function(dist) {
    const topicQuestions = QUESTIONS_BY_TOPIC[dist.topic] || [];

    if (dist.choice > 0) {
      const choices = topicQuestions.filter(function(q) { return q.type === 'choice'; });
      const selected = shuffle(choices).slice(0, dist.choice);
      selected.forEach(function(q) { paper.push(q); usedIds.add(q.id); });
    }

    if (dist.fill > 0) {
      const fills = topicQuestions.filter(function(q) { return q.type === 'fill'; });
      const selected = shuffle(fills).slice(0, dist.fill);
      selected.forEach(function(q) { paper.push(q); usedIds.add(q.id); });
    }
  });

  return shuffle(paper);
}

function getNotebook() {
  try {
    return JSON.parse(localStorage.getItem('zk_nb_' + QUIZ_META.source) || '[]');
  } catch (e) { return []; }
}

function saveNotebook(nb) {
  localStorage.setItem('zk_nb_' + QUIZ_META.source, JSON.stringify(nb));
}

function addToNotebook(wrongResults) {
  const nb = getNotebook();
  const now = new Date().toISOString();
  wrongResults.forEach(function(r) {
    var existIdx = -1;
    for (var i = 0; i < nb.length; i++) {
      if (nb[i].topic === r.topic && nb[i].qId === r.id) { existIdx = i; break; }
    }
    var entry = {
      qId: r.id,
      subject: r.subject,
      topic: r.topic,
      text: r.text,
      type: r.type,
      options: r.options || null,
      studentAnswer: r.studentAnswer,
      correctAnswer: r.answer,
      explain: r.explain,
      wrongCount: 1,
      mastered: false,
      addedAt: now,
      updatedAt: now
    };
    if (existIdx >= 0) {
      entry.wrongCount = (nb[existIdx].wrongCount || 1) + 1;
      entry.addedAt = nb[existIdx].addedAt;
      nb[existIdx] = entry;
    } else {
      nb.push(entry);
    }
  });
  saveNotebook(nb);
  updateNotebookBadge();
}

function removeFromNotebook(idx) {
  const nb = getNotebook();
  nb.splice(idx, 1);
  saveNotebook(nb);
  updateNotebookBadge();
}

function toggleMastered(idx) {
  const nb = getNotebook();
  if (nb[idx]) {
    nb[idx].mastered = !nb[idx].mastered;
    nb[idx].updatedAt = new Date().toISOString();
    saveNotebook(nb);
  }
}

function updateNotebookBadge() {
  const nb = getNotebook();
  const unmastered = nb.filter(function(item) { return !item.mastered; }).length;
  const btn = document.getElementById('btnNotebook');
  const badge = document.getElementById('notebookBadge');
  if (unmastered > 0) {
    btn.style.display = 'inline-block';
    badge.textContent = unmastered;
  } else if (nb.length > 0) {
    btn.style.display = 'inline-block';
    badge.textContent = nb.length;
  } else {
    btn.style.display = 'none';
  }
}

function filterNotebook(filter, btn) {
  document.querySelectorAll('.nb-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  const nb = getNotebook();
  const list = document.getElementById('notebookList');
  list.innerHTML = '';

  var filtered = nb;
  if (filter === 'unmastered') filtered = nb.filter(function(item) { return !item.mastered; });
  else if (filter === 'mastered') filtered = nb.filter(function(item) { return item.mastered; });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="notebook-empty"><div class="notebook-empty-icon">📫</div>暂无' +
      (filter === 'unmastered' ? '未掌握的' : filter === 'mastered' ? '已掌握的' : '') + '错题</div>';
    return;
  }

  filtered.forEach(function(item) {
    var realIdx = nb.indexOf(item);
    var div = document.createElement('div');
    div.className = 'nb-item' + (item.mastered ? ' mastered-item' : '');

    var dateStr = item.updatedAt ? new Date(item.updatedAt).toLocaleDateString('zh-CN') : '';
    var masteredLabel = item.mastered ? '已掌握' : '标记掌握';
    var masteredClass = item.mastered ? ' mastered' : '';

    div.innerHTML =
      '<div class="nb-item-header">' +
        '<div class="nb-item-meta">' + item.subject + ' · ' + item.topic + ' · 错' + (item.wrongCount || 1) + '次 · ' + dateStr + '</div>' +
        '<div class="nb-item-actions">' +
          '<button class="nb-btn' + masteredClass + '" onclick="doToggleMastered(' + realIdx + ')">' + masteredLabel + '</button>' +
          '<button class="nb-btn delete" onclick="doRemoveNotebook(' + realIdx + ')">移除</button>' +
        '</div>' +
      '</div>' +
      '<div class="nb-item-q">' + item.text + '</div>' +
      '<div class="nb-item-answer">你的答案：<span style="color:var(--error)">' + item.studentAnswer + '</span> 正确答案：<span style="color:var(--success)">' + item.correctAnswer + '</span></div>' +
      '<div class="nb-item-explain">' + item.explain + '</div>';
    list.appendChild(div);
  });

  renderMath();
}

function doToggleMastered(idx) {
  toggleMastered(idx);
  var activeBtn = document.querySelector('.nb-filter-btn.active');
  var filter = activeBtn.textContent.includes('未掌握') ? 'unmastered' :
               activeBtn.textContent.includes('已掌握') ? 'mastered' : 'all';
  filterNotebook(filter, activeBtn);
}

function doRemoveNotebook(idx) {
  if (confirm('确定从错题本中移除这道题吗？')) {
    removeFromNotebook(idx);
    var activeBtn = document.querySelector('.nb-filter-btn.active');
    var filter = activeBtn.textContent.includes('未掌握') ? 'unmastered' :
                 activeBtn.textContent.includes('已掌握') ? 'mastered' : 'all';
    filterNotebook(filter, activeBtn);
  }
}

function renderPaper() {
  currentPaper = generatePaper();
  currentQ = 0;
  answers = {};

  var container = document.getElementById('questionContainer');
  container.innerHTML = '';

  currentPaper.forEach(function(q, i) {
    var card = document.createElement('div');
    card.className = 'question-card' + (i === 0 ? ' active' : '');
    card.id = 'qcard-' + i;

    var diffLabel = { basic: '基础', medium: '中档', hard: '拔高' }[q.difficulty];
    var diffClass = q.difficulty;

    var html =
      '<div class="q-number">' +
        '<span class="q-badge">第 ' + (i + 1) + ' 题</span>' +
        '<span class="q-difficulty ' + diffClass + '">' + diffLabel + '</span>' +
        '<span class="q-subject">' + q.subject + ' · ' + q.topic + '</span>' +
      '</div>' +
      '<div class="q-text">' + q.text + '</div>';

    if (q.type === 'choice') {
      html += '<div class="options">';
      var letters = ['A', 'B', 'C', 'D'];
      q.options.forEach(function(opt, j) {
        html +=
          '<div class="option" data-q="' + i + '" data-val="' + letters[j] + '" onclick="selectOption(this, ' + i + ', \'' + letters[j] + "')">" +
            '<span class="option-letter">' + letters[j] + '</span>' +
            '<span>' + opt + '</span>' +
          '</div>';
      });
      html += '</div>';
    } else if (q.type === 'fill') {
      html +=
        '<input class="fill-input" type="text" placeholder="输入你的答案"' +
        ' data-q="' + i + '" oninput="fillAnswer(' + i + ', this.value)">' +
        '<div class="fill-hint">填写后自动保存</div>';
    }

    card.innerHTML = html;
    container.appendChild(card);
  });

  var navDots = document.getElementById('navDots');
  navDots.innerHTML = '';
  currentPaper.forEach(function(_, i) {
    var dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.textContent = i + 1;
    dot.onclick = (function(idx) { return function() { goToQuestion(idx); }; })(i);
    navDots.appendChild(dot);
  });

  updateBottomBar();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    elapsedSeconds++;
    var m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
    var s = String(elapsedSeconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}

function selectOption(el, qIdx, val) {
  document.querySelectorAll('.option[data-q="' + qIdx + '"]').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  answers[qIdx] = val;
  updateNavDots();
  updateBottomBar();

  setTimeout(function() {
    if (currentQ < currentPaper.length - 1) nextQuestion();
  }, 300);
}

function fillAnswer(qIdx, val) {
  if (val.trim()) {
    answers[qIdx] = val.trim();
  } else {
    delete answers[qIdx];
  }
  updateNavDots();
  updateBottomBar();
}

function prevQuestion() {
  if (currentQ > 0) goToQuestion(currentQ - 1);
}

function nextQuestion() {
  if (currentQ < currentPaper.length - 1) goToQuestion(currentQ + 1);
}

function goToQuestion(idx) {
  document.getElementById('qcard-' + currentQ).classList.remove('active');
  document.getElementById('qcard-' + idx).classList.add('active');

  var dots = document.querySelectorAll('.nav-dot');
  dots[currentQ].classList.remove('active');
  dots[idx].classList.add('active');

  currentQ = idx;
  updateBottomBar();
  renderMath();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNavDots() {
  var dots = document.querySelectorAll('.nav-dot');
  currentPaper.forEach(function(_, i) {
    dots[i].classList.remove('answered');
    if (answers[i] !== undefined) dots[i].classList.add('answered');
  });
}

function updateBottomBar() {
  var answered = Object.keys(answers).length;
  var total = currentPaper.length;
  document.getElementById('answerCount').textContent = '已答 ' + answered + '/' + total;
  document.getElementById('progressFill').style.width = (answered / total * 100) + '%';

  document.getElementById('btnPrev').disabled = currentQ === 0;
  document.getElementById('btnNext').style.display = currentQ === total - 1 ? 'none' : 'inline-block';

  var submitBtn = document.getElementById('btnSubmit');
  if (answered === total) {
    submitBtn.classList.add('show');
  } else {
    submitBtn.classList.remove('show');
  }
}

// ============================================================
// SUBMIT & RESULTS
// ============================================================
function submitQuiz() {
  var answered = Object.keys(answers).length;
  if (answered < currentPaper.length) {
    if (!confirm('还有 ' + (currentPaper.length - answered) + ' 题未作答，确定交卷吗？')) return;
  }

  quizSubmitted = true;
  clearInterval(timerInterval);

  var correctCount = 0;
  var results = currentPaper.map(function(q, i) {
    var studentAns = answers[i] || '未作答';
    var isCorrect = false;

    if (q.type === 'choice') {
      isCorrect = studentAns === q.answer;
    } else if (q.type === 'fill') {
      var normalized = studentAns.replace(/\s/g, '').toLowerCase();
      var correctNormalized = q.answer.replace(/\s/g, '').toLowerCase();
      isCorrect = normalized === correctNormalized;
      if (!isCorrect && q.acceptAlso) {
        isCorrect = q.acceptAlso.some(function(a) {
          return a.replace(/\s/g, '').toLowerCase() === normalized;
        });
      }
    }

    if (isCorrect) correctCount++;
    return {
      id: q.id, subject: q.subject, topic: q.topic, difficulty: q.difficulty,
      type: q.type, text: q.text, options: q.options, answer: q.answer,
      explain: q.explain, acceptAlso: q.acceptAlso,
      studentAnswer: studentAns, isCorrect: isCorrect
    };
  });

  var wrongResults = results.filter(function(r) { return !r.isCorrect; });
  if (wrongResults.length > 0) {
    addToNotebook(wrongResults);
  }

  showResults(results, correctCount);
}

function showResults(results, correctCount) {
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('resultsPage').classList.add('show');

  var total = currentPaper.length;
  var wrongCount = total - correctCount;
  var pct = Math.round(correctCount / total * 100);

  var circumference = 2 * Math.PI * 60;
  var offset = circumference * (1 - pct / 100);
  var ring = document.getElementById('scoreRing');
  var color = pct >= 80 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--error)';
  ring.style.stroke = color;
  setTimeout(function() { ring.style.strokeDashoffset = offset; }, 100);

  document.getElementById('scoreNumber').textContent = pct + '%';
  document.getElementById('scoreNumber').style.color = color;

  var label = '';
  if (pct >= 90) label = '非常棒！继续保持 💪';
  else if (pct >= 70) label = '不错，还有提升空间';
  else if (pct >= 50) label = '基础需要加强，加油！';
  else label = '建议重新复习后再次测试';
  document.getElementById('scoreLabel').textContent = label;

  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  var m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
  var s = String(elapsedSeconds % 60).padStart(2, '0');
  document.getElementById('statTime').textContent = m + ':' + s;

  renderDiagnosis(results);
  renderReviewList(results, 'all');

  window._quizResults = { results: results, correctCount: correctCount, wrongCount: wrongCount, pct: pct, elapsedSeconds: elapsedSeconds };

  renderMath();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDiagnosis(results) {
  var list = document.getElementById('diagnosisList');
  list.innerHTML = '';

  var byTopic = {};
  results.forEach(function(r) {
    if (!byTopic[r.topic]) byTopic[r.topic] = { correct: 0, total: 0 };
    byTopic[r.topic].total++;
    if (r.isCorrect) byTopic[r.topic].correct++;
  });

  var topics = Object.keys(byTopic).sort(function(a, b) {
    return (byTopic[a].correct / byTopic[a].total) - (byTopic[b].correct / byTopic[b].total);
  });

  topics.forEach(function(topic) {
    var data = byTopic[topic];
    var accuracy = Math.round(data.correct / data.total * 100);
    var barColor = accuracy >= 80 ? 'var(--success)' : accuracy >= 50 ? 'var(--warning)' : 'var(--error)';

    var div = document.createElement('div');
    div.className = 'diagnosis-item';
    div.innerHTML =
      '<span class="diagnosis-topic">' + topic + '</span>' +
      '<div class="diagnosis-bar-wrap"><div class="diagnosis-bar" style="width:' + accuracy + '%;background:' + barColor + '"></div></div>' +
      '<span class="diagnosis-score" style="color:' + barColor + '">' + data.correct + '/' + data.total + '</span>';
    list.appendChild(div);
  });
}

function renderReviewList(results, filter) {
  var list = document.getElementById('reviewList');
  list.innerHTML = '';

  results.forEach(function(r, i) {
    if (filter === 'wrong' && r.isCorrect) return;

    var div = document.createElement('div');
    div.className = 'review-item ' + (r.isCorrect ? 'correct' : 'wrong');

    var statusIcon = r.isCorrect ? '✅' : '❌';
    var answerHtml = '';
    if (r.isCorrect) {
      answerHtml = '<div class="review-answer correct-text">' + statusIcon + ' 你的答案：' + r.studentAnswer + '</div>';
    } else {
      answerHtml = '<div class="review-answer wrong-text">' + statusIcon + ' 你的答案：' + r.studentAnswer + '</div>' +
        '<div class="review-answer correct-text" style="margin-top:4px">正确答案：' + r.answer + '</div>';
    }

    div.innerHTML =
      '<div class="review-q">第' + (i + 1) + '题 · ' + r.subject + ' · ' + r.topic + '</div>' +
      answerHtml +
      '<div class="review-explain">' + r.explain + '</div>';
    list.appendChild(div);
  });

  renderMath();
}

function toggleReview(filter, btn) {
  document.querySelectorAll('.review-toggle-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderReviewList(window._quizResults.results, filter);
}

// ============================================================
// COPY RESULTS
// ============================================================
function copyResults() {
  var data = window._quizResults;
  var results = data.results;
  var correctCount = data.correctCount;
  var wrongCount = data.wrongCount;
  var pct = data.pct;
  var elapsedSeconds = data.elapsedSeconds;
  var m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
  var s = String(elapsedSeconds % 60).padStart(2, '0');
  var studentName = QUIZ_META.student || '未填写';

  var text = '【鞜山中考教练·测试报告】\n';
  text += '学生：' + studentName + '\n';
  text += '年级：' + QUIZ_META.grade + '\n';
  text += '科目：' + QUIZ_META.subject + '\n';
  text += '日期：' + QUIZ_META.date + '\n';
  text += '得分：' + correctCount + '/' + currentPaper.length + '（' + pct + '%）\n';
  text += '用时：' + m + ':' + s + '\n';
  text += '来源：' + QUIZ_META.source + '\n\n';

  text += '--- 逐题详情 ---\n';
  results.forEach(function(r, i) {
    var status = r.isCorrect ? '✓' : '✗';
    var diffLabel = { basic: '基础', medium: '中档', hard: '拔高' }[r.difficulty];
    text += '第' + (i + 1) + '题 [' + r.subject + '·' + r.topic + '·' + diffLabel + '] ' + status + '\n';
    text += '  学生答案：' + r.studentAnswer;
    if (!r.isCorrect) text += ' | 正确答案：' + r.answer;
    text += '\n';
  });

  var wrongByTopic = {};
  results.forEach(function(r) {
    if (!r.isCorrect) {
      if (!wrongByTopic[r.topic]) wrongByTopic[r.topic] = 0;
      wrongByTopic[r.topic]++;
    }
  });

  text += '\n--- 薄弱知识点 ---\n';
  var topics = Object.keys(wrongByTopic);
  if (topics.length > 0) {
    topics.sort(function(a, b) { return wrongByTopic[b] - wrongByTopic[a]; });
    topics.forEach(function(t) {
      text += t + '：错' + wrongByTopic[t] + '题\n';
    });
  } else {
    text += '无薄弱点，全部正确！\n';
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('已复制，请粘贴发送给教练');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('已复制，请粘贴发送给教练');
  } catch (e) {
    showToast('复制失败，请手动长按选择复制');
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function retryQuiz() {
  clearInterval(timerInterval);
  elapsedSeconds = 0;
  currentQ = 0;
  answers = {};
  quizSubmitted = false;

  document.getElementById('resultsPage').classList.remove('show');

  var ring = document.getElementById('scoreRing');
  ring.style.strokeDashoffset = 377;

  document.getElementById('startPage').style.display = 'block';
  updateStartInfo();
  updateNotebookBadge();
  window.scrollTo({ top: 0 });
}

// ============================================================
// MATH RENDERING
// ============================================================
function renderMath() {
  if (window.renderMathInElement) {
    renderMathInElement(document.body, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    });
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var check = setInterval(function() {
    if (window.renderMathInElement) {
      clearInterval(check);
      initQuiz();
    }
  }, 100);
  setTimeout(function() { if (!quizStarted) initQuiz(); }, 3000);
});
<\/script>
